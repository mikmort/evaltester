    description: "Westlaw Precision annual research subscription renewal (100 attorney seats)"
    # Expected Account: 54000 (Legal Research Subscriptions)
    # Reasoning: Legal research database subscription used by attorneys falls under research subscriptions
    # Alternatives Considered: 61100 (Cloud Subscriptions) - rejected; this is legal research, not general SaaS
    # Business Context: Law firms maintain separate GL for research databases (Westlaw/Lexis)
    test_setup_files: "LarryLegal_vendors.yaml, LarryLegal_glaccounts.yaml"
    vendor: "Westlaw (Thomson Reuters)"
    line_items:
      - line_id: 10000
        description: "Annual Westlaw Precision firmwide license (100 seats)"
        amount: 185000.00
    expected_data:
      - line_id: 10000
        account_id: "54000"

