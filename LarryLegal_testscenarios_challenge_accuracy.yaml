# LarryLegal - Challenge Accuracy Test Scenarios
# Exactly 48 cases organized as 24 A/B pairs. For each pair:
# - (A) is intentionally ambiguous, where a naïve keyword-only model might misclassify
# - (B) is expert-clear, including domain cues that justify the expected GL account
# Each case includes a brief reasoning note to explain the mapping logic.

tests:
  # Setup: Use the same modular files as Standard; Historical is applied via runner.
  - name: "LL-CH-001A Ambiguous: Westlaw vs Lexis - generic \"legal platform\""
    description: "Subscription renewal for legal platform - enterprise access"
    test_setup_files: "LarryLegal_vendors.yaml, LarryLegal_glaccounts.yaml"
    vendor: "Westlaw (Thomson Reuters)"
    line_items:
      - line_id: 10000
        description: "Annual license - legal platform"
        unit_price: 12500.00
    expected_data:
      # Reasoning: Despite generic phrasing, Westlaw is a legal research vendor -> 54000
      - line_id: 10000
        account_id: "54000"

